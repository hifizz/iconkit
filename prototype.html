<div style="padding: 0.5rem 0;">

<div style="border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary);">

  <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:0.5px solid var(--color-border-tertiary); background:var(--color-background-secondary);">

      <i class="ti ti-square-rounded" style="font-size:18px; color:var(--color-text-secondary);" aria-hidden="true"></i>

      </div>

        <span style="font-size:11px; padding:3px 7px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-tertiary); color:var(--color-text-secondary);">Tabler</span>

        <div style="aspect-ratio:1; border:0.5px solid var(--color-border-info); border-radius:var(--border-radius-md); display:flex; align-items:center; justify-content:center;"><i class="ti ti-rocket" style="font-size:16px;" aria-hidden="true"></i></div>
        <div style="aspect-ratio:1; border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-md); display:flex; align-items:center; justify-content:center; color:var(--color-text-secondary);"><i class="ti ti-bolt" style="font-size:16px;" aria-hidden="true"></i></div>

      </div>
      <div style="margin-top:10px; font-size:11px; color:#0F6E56;">新增：多图标库 + 上传 SVG</div>

    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:16px; border-right:0.5px solid var(--color-border-tertiary);">

        <i class="ti ti-rocket" style="font-size:70px; color:#fff;" aria-hidden="true"></i>
      </div>
      <div style="display:flex; align-items:flex-end; gap:14px;">

        <div style="text-align:center;"><div style="width:24px; height:24px; border-radius:6px; background:#7F77DD; margin:0 auto;"></div><div style="font-size:10px; color:var(--color-text-tertiary); margin-top:3px;">32</div></div>
        <div style="text-align:center;"><div style="width:40px; height:40px; border-radius:9px; background:#7F77DD; margin:0 auto;"></div><div style="font-size:10px; color:var(--color-text-tertiary); margin-top:3px;">180</div></div>
        <div style="text-align:center;"><div style="width:52px; height:52px; border-radius:12px; background:#7F77DD; margin:0 auto;"></div><div style="font-size:10px; color:var(--color-text-tertiary); margin-top:3px;">512</div></div>
      </div>
      <div style="font-size:11px; color:#0F6E56;">新增：多尺寸实时预览（一眼看清小尺寸糊不糊）</div>
    </div>

    <div style="padding:12px; display:flex; flex-direction:column; gap:8px;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:7px 10px; border-radius:var(--border-radius-md); background:var(--color-background-secondary); font-size:12px;"><span>Presets</span><span style="font-size:10px; color:var(--color-text-tertiary);">复刻</span></div>
      <div style="display:flex; gap:5px;">
        <div style="width:22px; height:22px; border-radius:6px; background:#7F77DD;"></div>
        <div style="width:22px; height:22px; border-radius:6px; background:#1D9E75;"></div>
        <div style="width:22px; height:22px; border-radius:6px; background:#D4537E;"></div>
        <div style="width:22px; height:22px; border-radius:6px; background:#378ADD;"></div>
        <div style="width:22px; height:22px; border-radius:6px; background:#EF9F27;"></div>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; padding:7px 10px; border-radius:var(--border-radius-md); background:var(--color-background-secondary); font-size:12px;"><span>Fill / Background / Icon</span><span style="font-size:10px; color:var(--color-text-tertiary);">复刻</span></div>
      <div style="display:flex; align-items:center; justify-content:space-between; padding:7px 10px; border-radius:var(--border-radius-md); border:0.5px solid #1D9E75; font-size:12px;"><span>iOS 背景预设</span><span style="font-size:10px; color:#0F6E56;">新</span></div>
      <div style="font-size:11px; color:var(--color-text-tertiary); line-height:1.6; margin-top:2px;">右栏整体复刻 ray.so，<br/>加一组 iOS 风格 squircle 背景。</div>
    </div>

  </div>
